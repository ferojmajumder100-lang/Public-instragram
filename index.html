<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Update - কাজ চলছে</title>
    <style>
        /* ফন্ট এবং বেসিক স্টাইল */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 90%;
            width: 400px;
        }

        /* অ্যানিমেশন আইকন */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffde59;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status-tag {
            display: inline-block;
            padding: 5px 15px;
            background-color: #e74c3c;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        
        <div class="status-tag">বর্তমানে কাজ চলছে</div>
        
        <h1>অ্যাপ আপডেট হচ্ছে</h1>
        
        <p>আমরা আপনার অভিজ্ঞতা আরও উন্নত করতে অ্যাপটির আপডেটের কাজ করছি। অনুগ্রহ করে কিছুক্ষণ অপেক্ষা করুন।</p>
        
        <p style="font-size: 14px; opacity: 0.8;">খুব শীঘ্রই আমরা ফিরে আসছি!</p>
    </div>

</body>
</html>
